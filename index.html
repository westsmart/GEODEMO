<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GEODEMO - ZONA1 AR</title>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <!-- AR.js con soporte de geolocalización -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; font-family: Arial, sans-serif; }

      #info-panel {
        position: fixed;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.7);
        color: white;
        padding: 10px 18px;
        border-radius: 20px;
        font-size: 13px;
        z-index: 9999;
        text-align: center;
        pointer-events: none;
      }

      #status {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 100, 255, 0.8);
        color: white;
        padding: 8px 16px;
        border-radius: 16px;
        font-size: 12px;
        z-index: 9999;
        text-align: center;
        min-width: 260px;
      }
    </style>
  </head>

  <body>
    <div id="info-panel">📍 GEODEMO — ZONA 1 | Apunta al terreno</div>
    <div id="status">📡 Obteniendo GPS...</div>

    <a-scene
      vr-mode-ui="enabled: false"
      arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false; trackingMethod: best;"
      renderer="antialias: true; alpha: true"
      embedded
    >
      <a-camera gps-projected-camera rotation-reader></a-camera>

      <!-- Vértices del polígono ZONA1 convertidos a puntos individuales -->
      <!-- Centro aproximado del polígono para la etiqueta -->
      <a-entity
        gps-projected-entity-place="latitude: -33.454617; longitude: -70.667666"
      >
        <!-- Etiqueta flotante -->
        <a-text
          value="ZONA 1\nID: 1"
          align="center"
          color="#FFFFFF"
          scale="30 30 30"
          position="0 20 0"
          look-at="[gps-projected-camera]"
        ></a-text>

        <!-- Marcador visual en el centro -->
        <a-box
          color="#0055FF"
          opacity="0.7"
          scale="10 5 10"
          position="0 2.5 0"
        ></a-box>
      </a-entity>

      <!-- Puntos en cada vértice del polígono para visualizar el contorno -->
      <a-entity gps-projected-entity-place="latitude: -33.454658; longitude: -70.668177">
        <a-sphere color="#FF3300" radius="3" opacity="0.9"></a-sphere>
      </a-entity>

      <a-entity gps-projected-entity-place="latitude: -33.454477; longitude: -70.667172">
        <a-sphere color="#FF3300" radius="3" opacity="0.9"></a-sphere>
      </a-entity>

      <a-entity gps-projected-entity-place="latitude: -33.454559; longitude: -70.667155">
        <a-sphere color="#FF3300" radius="3" opacity="0.9"></a-sphere>
      </a-entity>

      <a-entity gps-projected-entity-place="latitude: -33.454737; longitude: -70.816970">
        <a-sphere color="#FF3300" radius="3" opacity="0.9"></a-sphere>
      </a-entity>

    </a-scene>

    <script>
      // Estado GPS
      const statusEl = document.getElementById("status");

      if (navigator.geolocation) {
        navigator.geolocation.watchPosition(
          (pos) => {
            const lat = pos.coords.latitude.toFixed(6);
            const lon = pos.coords.longitude.toFixed(6);
            const acc = pos.coords.accuracy.toFixed(0);
            statusEl.textContent = `📡 GPS: ${lat}, ${lon} | ±${acc}m`;
            statusEl.style.background = "rgba(0, 160, 0, 0.8)";
          },
          (err) => {
            statusEl.textContent = "⚠️ Error GPS: " + err.message;
            statusEl.style.background = "rgba(200, 0, 0, 0.8)";
          },
          { enableHighAccuracy: true, maximumAge: 1000 }
        );
      } else {
        statusEl.textContent = "❌ GPS no disponible en este dispositivo";
      }
    </script>
  </body>
</html>
