<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>GEODEMO - ZONA1</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: black; font-family: Arial, sans-serif; }

    #info {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75);
      color: white;
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 13px;
      z-index: 200;
      text-align: center;
    }

    #status {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,80,200,0.85);
      color: white;
      padding: 8px 18px;
      border-radius: 16px;
      font-size: 12px;
      z-index: 200;
      text-align: center;
      min-width: 280px;
    }

    #debug {
      position: fixed;
      bottom: 60px;
      left: 8px;
      background: rgba(0,0,0,0.65);
      color: #0f0;
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 11px;
      z-index: 200;
      line-height: 1.8;
    }

    #video {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    #three-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <video id="video" autoplay playsinline muted></video>
  <canvas id="three-canvas"></canvas>

  <div id="info">👆 Toca para activar sensores</div>
  <div id="debug">Iniciando...</div>
  <div id="status">📡 Esperando GPS...</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <script>
    // ════════════════════════════════════════════════════════════════════
    // DATOS: ZONA1 — vértices en WGS84 (lon, lat)
    // ════════════════════════════════════════════════════════════════════
    const VERTICES_GEO = [
      { lon: -70.668177278025937, lat: -33.454657926808004 },
      { lon: -70.667171620456187, lat: -33.454476908445450 },
      { lon: -70.667155164241407, lat: -33.454559189519337 },
      { lon: -70.668169964152710, lat: -33.454736550945277 },
    ];

    const WALL_HEIGHT = 5;   // metros de altura de las paredes
    const EYE_HEIGHT  = 1.6; // altura de la cámara del usuario (metros)

    // ════════════════════════════════════════════════════════════════════
    // ECEF — Earth-Centered Earth-Fixed
    // Convierte (lon°, lat°, alt_m) → (X, Y, Z) en metros absolutos
    // ════════════════════════════════════════════════════════════════════
    const WGS84_A  = 6378137.0;
    const WGS84_E2 = 0.00669437999014;

    function geoToECEF(lon_deg, lat_deg, alt = 0) {
      const lon = lon_deg * Math.PI / 180;
      const lat = lat_deg * Math.PI / 180;
      const N = WGS84_A / Math.sqrt(1 - WGS84_E2 * Math.sin(lat) ** 2);
      return new THREE.Vector3(
        (N + alt) * Math.cos(lat) * Math.cos(lon),
        (N + alt) * Math.cos(lat) * Math.sin(lon),
        (N * (1 - WGS84_E2) + alt) * Math.sin(lat)
      );
    }

    // ════════════════════════════════════════════════════════════════════
    // ENU — East North Up
    // Marco local centrado en el usuario.
    // Convierte un punto ECEF al espacio ENU del origen dado.
    // ════════════════════════════════════════════════════════════════════
    function ecefToENU(point_ecef, origin_ecef, origin_lon_deg, origin_lat_deg) {
      const lon = origin_lon_deg * Math.PI / 180;
      const lat = origin_lat_deg * Math.PI / 180;

      const dx = point_ecef.x - origin_ecef.x;
      const dy = point_ecef.y - origin_ecef.y;
      const dz = point_ecef.z - origin_ecef.z;

      // Matriz rotación ECEF→ENU
      const e = new THREE.Vector3(
        -Math.sin(lon),
         Math.cos(lon),
         0
      );
      const n = new THREE.Vector3(
        -Math.sin(lat) * Math.cos(lon),
        -Math.sin(lat) * Math.sin(lon),
         Math.cos(lat)
      );
      const u = new THREE.Vector3(
         Math.cos(lat) * Math.cos(lon),
         Math.cos(lat) * Math.sin(lon),
         Math.sin(lat)
      );

      return new THREE.Vector3(
        e.x*dx + e.y*dy + e.z*dz,  // East  → X en Three.js
        u.x*dx + u.y*dy + u.z*dz,  // Up    → Y en Three.js
        -(n.x*dx + n.y*dy + n.z*dz) // North → -Z en Three.js (conv. OpenGL)
      );
    }

    // ════════════════════════════════════════════════════════════════════
    // ORIENTACIÓN — DeviceOrientation → Quaternion ENU
    // Convierte los ángulos del sensor al marco ENU local correcto
    // para cualquier posición del teléfono (vertical, horizontal, etc.)
    // ════════════════════════════════════════════════════════════════════
    let devAlpha = 0, devBeta = 90, devGamma = 0;
    let orientationReady = false;

    // Quaternion de corrección para pantalla portrait (cámara trasera)
    // Rota el marco del dispositivo al marco de la cámara Three.js
    const Q_SCREEN = new THREE.Quaternion(
      -Math.SQRT1_2, 0, 0, Math.SQRT1_2
    );

    function getENUQuaternion() {
      const DEG = THREE.MathUtils.degToRad;

      // Spec W3C DeviceOrientation: rotación intrínseca Z-X-Y
      const qZ = new THREE.Quaternion().setFromAxisAngle(
        new THREE.Vector3(0, 0, 1), DEG(-devAlpha)
      );
      const qX = new THREE.Quaternion().setFromAxisAngle(
        new THREE.Vector3(1, 0, 0), DEG(devBeta)
      );
      const qY = new THREE.Quaternion().setFromAxisAngle(
        new THREE.Vector3(0, 1, 0), DEG(devGamma)
      );

      const q = new THREE.Quaternion();
      q.multiply(qZ).multiply(qX).multiply(qY);

      // Corrección de pantalla portrait
      q.multiply(Q_SCREEN);

      return q;
    }

    // ════════════════════════════════════════════════════════════════════
    // THREE.JS — Escena
    // ════════════════════════════════════════════════════════════════════
    let scene, camera, renderer;
    let wallGroup = null;

    function initThree() {
      const canvas = document.getElementById('three-canvas');
      renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setClearColor(0x000000, 0);

      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(
        70,
        window.innerWidth / window.innerHeight,
        0.1,
        100000
      );
      // La cámara siempre en el origen ENU (el usuario es el centro)
      camera.position.set(0, 0, 0);

      scene.add(new THREE.AmbientLight(0xffffff, 1));

      window.addEventListener('resize', () => {
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
      });

      animate();
    }

    // Construye las paredes cuando ya tenemos GPS
    function buildWalls(userLon, userLat) {
      if (wallGroup) {
        scene.remove(wallGroup);
        wallGroup.clear();
      }
      wallGroup = new THREE.Group();

      const originECEF = geoToECEF(userLon, userLat, 0);

      // Obtener vértices en ENU (al nivel del suelo y en lo alto)
      const baseVerts = VERTICES_GEO.map(v => {
        const ecef = geoToECEF(v.lon, v.lat, 0);
        const enu  = ecefToENU(ecef, originECEF, userLon, userLat);
        enu.y = -EYE_HEIGHT; // nivel del suelo relativo al ojo
        return enu;
      });

      const topVerts = baseVerts.map(v =>
        new THREE.Vector3(v.x, v.y + WALL_HEIGHT, v.z)
      );

      // Material paredes: sólido rojo con algo de transparencia
      const wallMat = new THREE.MeshBasicMaterial({
        color: 0xFF1111,
        opacity: 0.75,
        transparent: true,
        side: THREE.DoubleSide,
        depthWrite: false
      });

      // Aristas verticales y horizontales como líneas gruesas
      const edgeMat = new THREE.LineBasicMaterial({ color: 0xFF0000 });

      const n = baseVerts.length;
      for (let i = 0; i < n; i++) {
        const j = (i + 1) % n;

        const b0 = baseVerts[i], b1 = baseVerts[j];
        const t0 = topVerts[i],  t1 = topVerts[j];

        // ── Cara de la pared (dos triángulos) ──
        const geo = new THREE.BufferGeometry();
        const positions = new Float32Array([
          b0.x, b0.y, b0.z,
          b1.x, b1.y, b1.z,
          t1.x, t1.y, t1.z,

          b0.x, b0.y, b0.z,
          t1.x, t1.y, t1.z,
          t0.x, t0.y, t0.z,
        ]);
        geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geo.computeVertexNormals();
        wallGroup.add(new THREE.Mesh(geo, wallMat));

        // ── Aristas de la cara ──
        const edgePts = [b0, b1, t1, t0, b0].map(
          v => new THREE.Vector3(v.x, v.y, v.z)
        );
        const edgeGeo = new THREE.BufferGeometry().setFromPoints(edgePts);
        wallGroup.add(new THREE.Line(edgeGeo, edgeMat));

        // ── Arista vertical del vértice i ──
        const vertGeo = new THREE.BufferGeometry().setFromPoints([
          new THREE.Vector3(b0.x, b0.y, b0.z),
          new THREE.Vector3(t0.x, t0.y, t0.z),
        ]);
        wallGroup.add(new THREE.Line(vertGeo, edgeMat));
      }

      // ── Etiqueta flotante en el centro del polígono ──
      const cLon = VERTICES_GEO.reduce((s,v) => s + v.lon, 0) / VERTICES_GEO.length;
      const cLat = VERTICES_GEO.reduce((s,v) => s + v.lat, 0) / VERTICES_GEO.length;
      const cECEF = geoToECEF(cLon, cLat, 0);
      const cENU  = ecefToENU(cECEF, originECEF, userLon, userLat);
      cENU.y = -EYE_HEIGHT + WALL_HEIGHT + 3;

      const cv = document.createElement('canvas');
      cv.width = 256; cv.height = 128;
      const ctx = cv.getContext('2d');
      ctx.fillStyle = 'rgba(0,0,0,0.8)';
      ctx.beginPath();
      ctx.roundRect(4, 4, 248, 120, 14);
      ctx.fill();
      ctx.fillStyle = '#FFFFFF';
      ctx.font = 'bold 34px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('ZONA 1', 128, 52);
      ctx.font = '22px Arial';
      ctx.fillStyle = '#FF4444';
      ctx.fillText('ID: 1', 128, 90);

      const tex    = new THREE.CanvasTexture(cv);
      const sprite = new THREE.Sprite(
        new THREE.SpriteMaterial({ map: tex, transparent: true })
      );
      sprite.scale.set(20, 10, 1);
      sprite.position.copy(cENU);
      wallGroup.add(sprite);

      scene.add(wallGroup);
    }

    // ════════════════════════════════════════════════════════════════════
    // CÁMARA DEL TELÉFONO
    // ════════════════════════════════════════════════════════════════════
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment' },
          audio: false
        });
        document.getElementById('video').srcObject = stream;
      } catch(e) {
        document.getElementById('status').textContent = '❌ Sin acceso a cámara';
      }
    }

    // ════════════════════════════════════════════════════════════════════
    // GPS
    // ════════════════════════════════════════════════════════════════════
    let userLat = null, userLon = null;
    let wallsBuilt = false;
    const statusEl = document.getElementById('status');
    const debugEl  = document.getElementById('debug');

    function initGPS() {
      if (!navigator.geolocation) {
        statusEl.textContent = '❌ GPS no disponible';
        return;
      }
      navigator.geolocation.watchPosition(pos => {
        userLat = pos.coords.latitude;
        userLon = pos.coords.longitude;
        const acc = pos.coords.accuracy.toFixed(0);

        // Reconstruir paredes cada vez que cambia el GPS
        // (el origen ENU cambia con el usuario)
        buildWalls(userLon, userLat);

        statusEl.style.background = acc < 15
          ? 'rgba(0,140,0,0.85)'
          : acc < 40
            ? 'rgba(180,120,0,0.85)'
            : 'rgba(180,0,0,0.85)';
        statusEl.textContent = `📡 GPS ±${acc}m`;

        // Distancia al centroide del polígono
        const R = 6371000;
        const cLon = VERTICES_GEO.reduce((s,v) => s + v.lon, 0) / VERTICES_GEO.length;
        const cLat = VERTICES_GEO.reduce((s,v) => s + v.lat, 0) / VERTICES_GEO.length;
        const dLat = (cLat - userLat) * Math.PI / 180;
        const dLon = (cLon - userLon) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 +
                  Math.cos(userLat*Math.PI/180) * Math.cos(cLat*Math.PI/180) *
                  Math.sin(dLon/2)**2;
        const dist = (R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))).toFixed(0);

        debugEl.innerHTML =
          `Lat: ${userLat.toFixed(6)}<br>` +
          `Lon: ${userLon.toFixed(6)}<br>` +
          `Dist al polígono: <b>${dist}m</b><br>` +
          `α:${devAlpha.toFixed(0)}° β:${devBeta.toFixed(0)}° γ:${devGamma.toFixed(0)}°`;

      }, err => {
        statusEl.textContent = '⚠️ GPS: ' + err.message;
        statusEl.style.background = 'rgba(180,0,0,0.85)';
      }, { enableHighAccuracy: true, maximumAge: 1000 });
    }

    // ════════════════════════════════════════════════════════════════════
    // SENSORES DE ORIENTACIÓN
    // ════════════════════════════════════════════════════════════════════
    function initOrientation() {
      const infoEl = document.getElementById('info');

      const activate = async () => {
        if (typeof DeviceOrientationEvent !== 'undefined' &&
            typeof DeviceOrientationEvent.requestPermission === 'function') {
          try {
            await DeviceOrientationEvent.requestPermission();
          } catch(e) {
            infoEl.textContent = '⚠️ Permiso de orientación denegado';
            return;
          }
        }
        infoEl.textContent = '📍 GEODEMO — ZONA 1';
        orientationReady = true;
      };

      // iOS necesita gesto; Android activa solo
      document.body.addEventListener('click', activate, { once: true });
      activate(); // intento inmediato para Android

      window.addEventListener('deviceorientationabsolute', e => {
        if (e.alpha !== null) devAlpha = e.alpha;
        if (e.beta  !== null) devBeta  = e.beta;
        if (e.gamma !== null) devGamma = e.gamma;
      }, true);

      window.addEventListener('deviceorientation', e => {
        if (e.alpha !== null) devAlpha = e.alpha;
        if (e.beta  !== null) devBeta  = e.beta;
        if (e.gamma !== null) devGamma = e.gamma;
      }, true);
    }

    // ════════════════════════════════════════════════════════════════════
    // LOOP DE RENDER
    // ════════════════════════════════════════════════════════════════════
    function animate() {
      requestAnimationFrame(animate);

      // La cámara siempre en origen (el mundo se construye relativo al usuario)
      camera.position.set(0, 0, 0);

      // Aplicar orientación del dispositivo en marco ENU
      camera.quaternion.copy(getENUQuaternion());

      renderer.render(scene, camera);
    }

    // ════════════════════════════════════════════════════════════════════
    // ARRANQUE
    // ════════════════════════════════════════════════════════════════════
    startCamera();
    initThree();
    initOrientation();
    initGPS();
  </script>
</body>
</html>
